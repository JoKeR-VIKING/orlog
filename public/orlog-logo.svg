<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">ORLOG logo</title>
  <desc id="desc">Original Viking dice-battle mark with rune ring, shield, axe, arrow, and favor token.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="64%">
      <stop offset="0%" stop-color="#3b2518"/>
      <stop offset="62%" stop-color="#1a1412"/>
      <stop offset="100%" stop-color="#080504"/>
    </radialGradient>
    <linearGradient id="gold" x1="42" y1="22" x2="202" y2="226" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f4c674"/>
      <stop offset="45%" stop-color="#c68234"/>
      <stop offset="100%" stop-color="#6b3a0e"/>
    </linearGradient>
    <linearGradient id="bone" x1="82" y1="54" x2="164" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0e2c0"/>
      <stop offset="100%" stop-color="#bfae8b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity=".55"/>
    </filter>
  </defs>

  <rect width="256" height="256" rx="44" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <circle cx="128" cy="128" r="96" fill="none" stroke="#2a1606" stroke-width="20"/>
    <circle cx="128" cy="128" r="86" fill="none" stroke="url(#gold)" stroke-width="12"/>
    <circle cx="128" cy="128" r="62" fill="#21130c" stroke="#6b3a0e" stroke-width="4"/>

    <path
      d="M128 66 L178 84 L178 123 C178 158 155 184 128 194 C101 184 78 158 78 123 L78 84 Z"
      fill="url(#bone)"
      stroke="#2a1606"
      stroke-width="7"
      stroke-linejoin="round"
    />
    <path d="M128 72 L128 190" stroke="#2a1606" stroke-width="6" stroke-linecap="round"/>
    <path d="M82 116 L174 116" stroke="#2a1606" stroke-width="6" stroke-linecap="round"/>

    <g stroke="#2a1606" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M71 183 L181 73"/>
      <path d="M177 73 L200 70 L197 93"/>
      <path d="M74 183 L94 176 L87 196"/>
    </g>

    <g transform="translate(54 56) rotate(-42)" stroke="#2a1606" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 88 L0 8"/>
      <path d="M-6 89 L-12 106"/>
      <path
        d="M-4 3 C29 0 44 21 35 48 C18 31 -4 27 -18 39 Z"
        fill="#c68234"
        stroke="#2a1606"
      />
    </g>

    <circle cx="128" cy="128" r="19" fill="url(#gold)" stroke="#2a1606" stroke-width="6"/>
    <circle cx="128" cy="128" r="8" fill="#2a1606" opacity=".82"/>
  </g>

  <g fill="#c68234" opacity=".88" font-family="serif" font-size="21" text-anchor="middle">
    <text x="128" y="31">ᛟ</text>
    <text x="185" y="48">ᚱ</text>
    <text x="221" y="105">ᛚ</text>
    <text x="221" y="161">ᛟ</text>
    <text x="185" y="217">ᚷ</text>
    <text x="128" y="236">ᛟ</text>
    <text x="71" y="217">ᚱ</text>
    <text x="35" y="161">ᛚ</text>
    <text x="35" y="105">ᚷ</text>
    <text x="71" y="48">ᛟ</text>
  </g>
</svg>
