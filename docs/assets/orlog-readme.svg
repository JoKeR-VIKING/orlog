<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 2200" role="img" aria-labelledby="title desc">
  <title id="title">ORLOG visual README</title>
  <desc id="desc">A Viking themed visual guide explaining ORLOG rules, dice faces, god favors, AI modes, and gameplay flow.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="18%" r="88%">
      <stop offset="0%" stop-color="#3a261b"/>
      <stop offset="48%" stop-color="#17100d"/>
      <stop offset="100%" stop-color="#070403"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4c674"/>
      <stop offset="48%" stop-color="#c68234"/>
      <stop offset="100%" stop-color="#6b3a0e"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#281a12"/>
      <stop offset="52%" stop-color="#513621"/>
      <stop offset="100%" stop-color="#24160f"/>
    </linearGradient>
    <linearGradient id="parchment" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e2cfaa"/>
      <stop offset="58%" stop-color="#c4ad86"/>
      <stop offset="100%" stop-color="#94764b"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000" flood-opacity=".55"/>
    </filter>
    <pattern id="runes" width="180" height="180" patternUnits="userSpaceOnUse">
      <rect width="180" height="180" fill="none"/>
      <g fill="#c68234" opacity=".08" font-family="serif" font-size="30">
        <text x="22" y="42">ᚠ</text><text x="92" y="62">ᚢ</text><text x="148" y="36">ᚦ</text>
        <text x="36" y="126">ᚨ</text><text x="116" y="140">ᚱ</text><text x="70" y="172">ᚲ</text>
      </g>
    </pattern>
    <pattern id="woodgrain" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="#382417"/>
      <path d="M0 4 C8 0 18 8 32 3 M0 15 C12 11 20 19 32 13 M0 27 C10 21 20 31 32 25" fill="none" stroke="#7b512c" stroke-width="1" opacity=".32"/>
    </pattern>
    <style>
      .heading{font-family:'Cormorant Unicase', Georgia, serif;font-weight:700;letter-spacing:.16em;text-transform:uppercase}
      .body{font-family:'EB Garamond', Georgia, serif}
      .rune{font-family:'MedievalSharp', Georgia, serif}
      .small{font-size:28px;fill:#d9c8a8}
      .tiny{font-size:22px;fill:#a99a87}
      .panelTitle{font-size:34px;fill:#f2d393}
      .ink{fill:#2a1606}
      .cream{fill:#eadcc2}
      .muted{fill:#b8aa92}
      .goldText{fill:#e8b45c}
      .ruleText{font-size:29px;fill:#efe2cc}
      .caption{font-size:24px;fill:#b9aa91}
    </style>
  </defs>

  <rect width="1600" height="2200" fill="url(#bg)"/>
  <rect width="1600" height="2200" fill="url(#runes)"/>
  <rect x="24" y="24" width="1552" height="2152" rx="44" fill="none" stroke="#6b3a0e" stroke-width="3" opacity=".85"/>
  <rect x="44" y="44" width="1512" height="2112" rx="34" fill="none" stroke="#c68234" stroke-width="2" opacity=".42"/>

  <g transform="translate(760 150)" filter="url(#softShadow)">
    <circle cx="0" cy="0" r="88" fill="#120b07" stroke="url(#gold)" stroke-width="12"/>
    <circle cx="0" cy="0" r="56" fill="#21130c" stroke="#6b3a0e" stroke-width="4"/>
    <path d="M0 -54 L47 -35 L47 7 C47 40 26 64 0 75 C-26 64 -47 40 -47 7 L-47 -35 Z" fill="url(#parchment)" stroke="#2a1606" stroke-width="6" stroke-linejoin="round"/>
    <path d="M0 -49 L0 69 M-42 4 L42 4" stroke="#2a1606" stroke-width="5" stroke-linecap="round"/>
    <path d="M-52 62 L54 -44 M50 -44 L72 -47 L69 -25" stroke="#2a1606" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="0" cy="0" r="16" fill="url(#gold)" stroke="#2a1606" stroke-width="5"/>
  </g>

  <text x="800" y="315" text-anchor="middle" class="heading" font-size="104" fill="#f4ead7">ORLOG</text>
  <text x="800" y="368" text-anchor="middle" class="heading" font-size="30" fill="#c68234">A Viking Dice Battle of Fate, Favor, and Steel</text>
  <text x="800" y="414" text-anchor="middle" class="body" font-size="28" fill="#a99a87">Fan-made dice battle inspired by the Orlog mini-game from Assassin's Creed Valhalla.</text>

  <g transform="translate(100 500)" filter="url(#softShadow)">
    <rect width="1400" height="250" rx="22" fill="url(#wood)" stroke="#8b5c2e" stroke-width="3"/>
    <rect x="24" y="24" width="1352" height="202" rx="14" fill="rgba(0,0,0,.2)" stroke="#c68234" stroke-opacity=".35"/>
    <text x="60" y="82" class="heading panelTitle">The Saga at a Glance</text>
    <text x="60" y="136" class="body ruleText">Two players begin with 15 health stones. Roll six fixed dice, keep what matters, steal favor,</text>
    <text x="60" y="184" class="body ruleText">block attacks, and spend favor to call the gods. Victory comes when your foe falls to 0 HP.</text>
  </g>

  <g transform="translate(100 820)">
    <text x="0" y="0" class="heading panelTitle">Dice Faces</text>
    <text x="0" y="42" class="body caption">Each physical die has six real sides. A gold border means that face earns one favor token.</text>
    <g transform="translate(0 78)">
      <g transform="translate(0 0)">
        <rect width="240" height="250" rx="18" fill="url(#parchment)" stroke="#2a1606" stroke-width="4"/>
        <path d="M82 128 L151 59" stroke="#2a1606" stroke-width="9" stroke-linecap="round"/>
        <path d="M132 48 C170 48 190 78 178 112 C154 91 127 88 107 105 Z" fill="#2a1606"/>
        <text x="120" y="184" text-anchor="middle" class="heading" font-size="27" fill="#2a1606">Axe</text>
        <text x="120" y="218" text-anchor="middle" class="body" font-size="25" fill="#3a2a18">Melee damage</text>
      </g>
      <g transform="translate(280 0)">
        <rect width="240" height="250" rx="18" fill="url(#parchment)" stroke="#c68234" stroke-width="12"/>
        <path d="M69 178 L175 72 M142 72 L176 72 L176 106" stroke="#2a1606" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="120" y="184" text-anchor="middle" class="heading" font-size="27" fill="#2a1606">Arrow</text>
        <text x="120" y="218" text-anchor="middle" class="body" font-size="25" fill="#3a2a18">Ranged damage</text>
      </g>
      <g transform="translate(560 0)">
        <rect width="240" height="250" rx="18" fill="url(#parchment)" stroke="#2a1606" stroke-width="4"/>
        <path d="M61 121 C61 76 86 47 120 47 C154 47 179 76 179 121 L179 154 L61 154 Z" fill="none" stroke="#2a1606" stroke-width="9"/>
        <path d="M120 58 L120 153 M78 104 L162 104" stroke="#2a1606" stroke-width="8" stroke-linecap="round"/>
        <text x="120" y="184" text-anchor="middle" class="heading" font-size="27" fill="#2a1606">Helmet</text>
        <text x="120" y="218" text-anchor="middle" class="body" font-size="25" fill="#3a2a18">Blocks axe</text>
      </g>
      <g transform="translate(840 0)">
        <rect width="240" height="250" rx="18" fill="url(#parchment)" stroke="#c68234" stroke-width="12"/>
        <path d="M120 43 L178 66 L178 118 C178 155 151 180 120 190 C89 180 62 155 62 118 L62 66 Z" fill="none" stroke="#2a1606" stroke-width="9" stroke-linejoin="round"/>
        <path d="M120 47 L120 188 M66 101 L174 101" stroke="#2a1606" stroke-width="8" stroke-linecap="round"/>
        <text x="120" y="206" text-anchor="middle" class="heading" font-size="27" fill="#2a1606">Shield</text>
        <text x="120" y="235" text-anchor="middle" class="body" font-size="25" fill="#3a2a18">Blocks arrow</text>
      </g>
      <g transform="translate(1120 0)">
        <rect width="240" height="250" rx="18" fill="url(#parchment)" stroke="#c68234" stroke-width="12"/>
        <circle cx="164" cy="77" r="24" fill="none" stroke="#2a1606" stroke-width="8"/>
        <path d="M62 171 C78 124 111 118 143 136 C164 148 174 164 174 184 M85 125 L85 91 M111 120 L111 81 M138 126 L138 92" fill="none" stroke="#2a1606" stroke-width="8" stroke-linecap="round"/>
        <text x="120" y="206" text-anchor="middle" class="heading" font-size="27" fill="#2a1606">Hand</text>
        <text x="120" y="235" text-anchor="middle" class="body" font-size="25" fill="#3a2a18">Steals favor</text>
      </g>
    </g>
  </g>

  <g transform="translate(100 1245)" filter="url(#softShadow)">
    <rect width="660" height="500" rx="24" fill="url(#wood)" stroke="#8b5c2e" stroke-width="3"/>
    <text x="38" y="62" class="heading panelTitle">How a Round Works</text>
    <g class="body ruleText">
      <text x="70" y="132">1. Roll six dice.</text>
      <text x="70" y="188">2. Keep any dice you want.</text>
      <text x="70" y="244">3. Reroll the rest up to two times.</text>
      <text x="70" y="300">4. Pick one god favor or skip.</text>
      <text x="70" y="356">5. Resolve favor, attacks, blocks, steals.</text>
      <text x="70" y="412">6. Next round begins with turn order flipped.</text>
    </g>
    <g fill="url(#gold)">
      <circle cx="42" cy="122" r="10"/><circle cx="42" cy="178" r="10"/><circle cx="42" cy="234" r="10"/>
      <circle cx="42" cy="290" r="10"/><circle cx="42" cy="346" r="10"/><circle cx="42" cy="402" r="10"/>
    </g>
  </g>

  <g transform="translate(840 1245)" filter="url(#softShadow)">
    <rect width="660" height="500" rx="24" fill="url(#wood)" stroke="#8b5c2e" stroke-width="3"/>
    <text x="38" y="62" class="heading panelTitle">God Favors</text>
    <text x="38" y="108" class="body caption">Choose 0 to 3 before the saga.</text>
    <text x="38" y="136" class="body caption">Your loadout is locked for the whole match.</text>
    <g transform="translate(38 148)">
      <g transform="translate(0 0)"><rect width="180" height="120" rx="14" fill="#1a1412" stroke="#c68234"/><text x="24" y="48" class="rune" font-size="38" fill="#c68234">ᚦ</text><text x="74" y="44" class="heading" font-size="18" fill="#eee0c6">Thor</text><text x="74" y="77" class="body" font-size="19" fill="#b8aa92">bonus hit</text></g>
      <g transform="translate(218 0)"><rect width="180" height="120" rx="14" fill="#1a1412" stroke="#c68234"/><text x="24" y="48" class="rune" font-size="38" fill="#c68234">ᛁ</text><text x="74" y="44" class="heading" font-size="18" fill="#eee0c6">Idun</text><text x="74" y="77" class="body" font-size="19" fill="#b8aa92">heal HP</text></g>
      <g transform="translate(436 0)"><rect width="180" height="120" rx="14" fill="#1a1412" stroke="#c68234"/><text x="24" y="48" class="rune" font-size="38" fill="#c68234">ᚢ</text><text x="74" y="44" class="heading" font-size="18" fill="#eee0c6">Vidar</text><text x="74" y="77" class="body" font-size="19" fill="#b8aa92">break helms</text></g>
      <g transform="translate(0 156)"><rect width="180" height="120" rx="14" fill="#1a1412" stroke="#8b5c2e"/><text x="24" y="48" class="rune" font-size="38" fill="#c68234">ᛋ</text><text x="74" y="44" class="heading" font-size="18" fill="#eee0c6">Skadi</text><text x="74" y="77" class="body" font-size="19" fill="#b8aa92">arrows +</text></g>
      <g transform="translate(218 156)"><rect width="180" height="120" rx="14" fill="#1a1412" stroke="#8b5c2e"/><text x="24" y="48" class="rune" font-size="38" fill="#c68234">ᚺ</text><text x="74" y="44" class="heading" font-size="18" fill="#eee0c6">Heimdall</text><text x="74" y="77" class="body" font-size="19" fill="#b8aa92">heal block</text></g>
      <g transform="translate(436 156)"><rect width="180" height="120" rx="14" fill="#1a1412" stroke="#8b5c2e"/><text x="24" y="48" class="rune" font-size="38" fill="#c68234">ᛇ</text><text x="74" y="44" class="heading" font-size="18" fill="#eee0c6">Skuld</text><text x="74" y="77" class="body" font-size="19" fill="#b8aa92">burn favor</text></g>
    </g>
  </g>

  <g transform="translate(100 1815)" filter="url(#softShadow)">
    <rect width="660" height="270" rx="24" fill="url(#wood)" stroke="#8b5c2e" stroke-width="3"/>
    <text x="38" y="62" class="heading panelTitle">AI Opponents</text>
    <text x="60" y="126" class="heading" font-size="30" fill="#e9dcc5">Skald</text><text x="330" y="126" class="body" font-size="26" fill="#b8aa92">novice, loose choices</text>
    <text x="60" y="178" class="heading" font-size="30" fill="#e9dcc5">Vikingr</text><text x="330" y="178" class="body" font-size="26" fill="#b8aa92">strategic, imperfect</text>
    <text x="60" y="230" class="heading" font-size="30" fill="#e9dcc5">Berserkr</text><text x="330" y="230" class="body" font-size="26" fill="#b8aa92">optimal, punishing</text>
  </g>

  <g transform="translate(840 1815)" filter="url(#softShadow)">
    <rect width="660" height="270" rx="24" fill="url(#wood)" stroke="#8b5c2e" stroke-width="3"/>
    <text x="38" y="62" class="heading panelTitle">Modes</text>
    <text x="60" y="126" class="body ruleText">Solo against the Æsir.</text>
    <text x="60" y="178" class="body ruleText">Private multiplayer by session rune.</text>
    <text x="60" y="230" class="body ruleText">Reconnect to the same saga mid-game.</text>
  </g>

  <text x="800" y="2142" text-anchor="middle" class="rune" font-size="32" fill="#c68234">ᚠ ᚢ ᚦ ᚨ ᚱ ᚲ · roll wisely · call boldly · carve the saga</text>
</svg>
